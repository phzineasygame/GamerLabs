        <stop offset="0%" stop-color="#FFF2A8"></stop>
        <stop offset="35%" stop-color="#D4AF37"></stop>
        <stop offset="70%" stop-color="#A67C00"></stop>
        <stop offset="100%" stop-color="#F7D774"></stop>
