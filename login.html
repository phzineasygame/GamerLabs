<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <title>Login - IGL</title>
</head>
<body>

<nav>
    <div class="LogoSoftware">
        <img src="assets/images/brand/Iconic.png" class="logo" alt="Logo">
    </div>
    <ul class="menu">
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="CriarConta.html">Criar Conta</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Entrar</h1>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <div class="password-field">
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="button" id="toggleSenha" aria-label="Mostrar senha" class="eye-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <br><br>
        <button type="submit" id="botao">Entrar</button>
    </form>
</div>



<script type="module" src="js/login.js"></script>
</body>
</html>
